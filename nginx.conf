# Mission Control - Nginx Reverse Proxy Configuration
# Production Domains: mission-control.uchitel.ca, mission-control-api.uchitel.ca

# Portal (Frontend)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mission-control.uchitel.ca;

    # SSL Configuration (update paths to your certificates)
    ssl_certificate /etc/ssl/certs/mission-control.uchitel.ca.crt;
    ssl_certificate_key /etc/ssl/private/mission-control.uchitel.ca.key;
    
    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    
    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Proxy to Next.js application
    location / {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Logs
    access_log /var/log/nginx/mission-control-portal-access.log;
    error_log /var/log/nginx/mission-control-portal-error.log;
}

# API Backend (same Next.js app, different domain for CORS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mission-control-api.uchitel.ca;

    # SSL Configuration
    ssl_certificate /etc/ssl/certs/mission-control-api.uchitel.ca.crt;
    ssl_certificate_key /etc/ssl/private/mission-control-api.uchitel.ca.key;
    
    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    
    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Proxy to Next.js application (same app, handles CORS based on PORTAL_URL)
    location / {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Logs
    access_log /var/log/nginx/mission-control-api-access.log;
    error_log /var/log/nginx/mission-control-api-error.log;
}

# HTTP to HTTPS redirect for Portal
server {
    listen 80;
    listen [::]:80;
    server_name mission-control.uchitel.ca;
    return 301 https://$server_name$request_uri;
}

# HTTP to HTTPS redirect for API
server {
    listen 80;
    listen [::]:80;
    server_name mission-control-api.uchitel.ca;
    return 301 https://$server_name$request_uri;
}
