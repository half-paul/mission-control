services:
  app:
    build: .
    ports:
      - "4000:3000"
    environment:
      - DATABASE_URL=postgresql://mc:mc@postgres:5432/mission_control
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-2lXD1LzmlHpG+vVmWTkA/xg3DRBs2YzQulyA9vkHEmA=}
      # Single container deployment: Frontend + API at same URL
      - BASE_URL=${BASE_URL:-http://localhost:4000}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-${BASE_URL:-http://localhost:4000}}
      # Client-side API URL (leave empty to use relative URLs in same container)
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-}
      - NODE_ENV=production
      - PROJECTS_PATH=/data/projects
    volumes:
      - /home/paul/.openclaw/workspace/projects:/data/projects:ro
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mission_control
      POSTGRES_USER: mc
      POSTGRES_PASSWORD: mc
    #ports:
    #  - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mc -d mission_control"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
